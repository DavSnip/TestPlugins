name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build plugins
        run: 
        ./gradlew Papadustream:make
        ./gradlew Flemmix:make
        ./gradlew Dulourd:make
        ./gradlew UnjourUnfilm:make
        ./gradlew Coflix:make

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cs3-builds
          path: "**/*.cs3"
