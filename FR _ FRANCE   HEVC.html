<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Reproductor IPTV</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <style>
        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .app {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #000;
        }

        .player-section {
            height: 42vh;
            min-height: 220px;
            background: #000;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            flex-direction: column;
            min-width: 0;
            flex: 0 0 auto;
        }

        .topbar {
            flex: 0 0 78px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 12px;
            background: #000;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .player-title {
            flex: 1;
            min-width: 0;
            padding: 8px 10px;
            border-radius: 12px;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(4px);
            font-size: 14px;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .video-wrap {
            flex: 1;
            min-height: 0;
            background: #000;
        }

        @property --ring-angle {
            syntax: '<angle>';
            inherits: false;
            initial-value: 0deg;
        }

        .vegeta-btn {
            --ring-angle: 0deg;
            border: 3px solid transparent;
            border-radius: 22px;
            padding: 12px 24px;
            cursor: pointer;
            white-space: nowrap;
            background:
                linear-gradient(rgba(8, 8, 8, 0.96), rgba(8, 8, 8, 0.96)) padding-box,
                conic-gradient(
                    from var(--ring-angle),
                    #ff8a00 0deg,
                    #ff5a1f 45deg,
                    #ff2f92 90deg,
                    #b026ff 135deg,
                    #6a2dff 180deg,
                    #2f6bff 225deg,
                    #00cfff 270deg,
                    #00f0ff 315deg,
                    #ff8a00 360deg
                ) border-box;
            box-shadow:
                0 0 12px rgba(255, 138, 0, 0.10),
                0 0 18px rgba(176, 38, 255, 0.14),
                0 0 24px rgba(0, 240, 255, 0.12),
                inset 0 0 18px rgba(255,255,255,0.03),
                inset 0 0 30px rgba(0,0,0,0.50);
            animation: vegetaRingSpin 2.8s linear infinite;
            transition: transform 0.18s ease, filter 0.18s ease, box-shadow 0.18s ease;
        }

        .vegeta-btn strong {
            display: inline-block;
            color: #d9d9d9;
            font-size: 15px;
            font-weight: 900;
            letter-spacing: 0.4px;
            text-shadow:
                0 1px 0 rgba(255,255,255,0.08),
                0 0 10px rgba(255,255,255,0.08);
        }

        .vegeta-btn:hover,
        .vegeta-btn:active {
            transform: scale(1.03);
            filter: brightness(1.08);
            box-shadow:
                0 0 14px rgba(255, 138, 0, 0.14),
                0 0 22px rgba(176, 38, 255, 0.18),
                0 0 30px rgba(0, 240, 255, 0.16),
                inset 0 0 18px rgba(255,255,255,0.03),
                inset 0 0 30px rgba(0,0,0,0.50);
        }

        @keyframes vegetaRingSpin {
            from { --ring-angle: 0deg; }
            to   { --ring-angle: 360deg; }
        }

        video {
            width: 100%;
            height: 100%;
            display: block;
            background: #000;
            object-fit: contain;
        }

        .list-section {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            background: #0b0b0b;
            min-width: 0;
        }

        .list-header {
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            background: #111;
            font-size: 14px;
            font-weight: bold;
            flex: 0 0 auto;
        }

        .table-wrap {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        tr {
            border-bottom: 1px solid rgba(255,255,255,0.06);
            cursor: pointer;
        }

        tr:hover {
            background: rgba(255,255,255,0.05);
        }

        tr.active {
            background: rgba(0, 207, 255, 0.14);
        }

        tr.retune-pulse {
            animation: retunePulse 0.9s ease;
        }

        @keyframes retunePulse {
            0% {
                background: rgba(0, 207, 255, 0.14);
                box-shadow: inset 0 0 0 rgba(0, 207, 255, 0);
            }
            35% {
                background: rgba(0, 207, 255, 0.32);
                box-shadow: inset 0 0 0 999px rgba(255,255,255,0.04);
            }
            100% {
                background: rgba(0, 207, 255, 0.14);
                box-shadow: inset 0 0 0 rgba(0, 207, 255, 0);
            }
        }

        td {
            padding: 10px 8px;
            vertical-align: middle;
            font-size: 14px;
        }

        .col-logo {
            width: 58px;
            text-align: center;
        }

        .logo {
            width: 42px;
            height: 42px;
            object-fit: contain;
            border-radius: 8px;
            background: #1a1a1a;
            display: inline-block;
        }

        .name-box {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .channel-name {
            font-weight: bold;
            line-height: 1.2;
        }

        .channel-sub {
            font-size: 12px;
            opacity: 0.75;
        }

        .play-badge {
            display: inline-block;
            min-width: 58px;
            text-align: center;
            padding: 6px 8px;
            border-radius: 999px;
            background: #00cfff;
            color: #000;
            font-size: 12px;
            font-weight: bold;
        }

        /* ===== Mode PC / TV ===== */
        body.desktop-tv-mode .app {
            flex-direction: row-reverse;
            align-items: flex-start;
        }

        body.desktop-tv-mode .player-section {
            width: 70vw;
            height: 46vh;
            min-height: 320px;
            max-height: 520px;
            border-bottom: 0;
            border-left: 1px solid rgba(255,255,255,0.08);
            align-self: flex-start;
        }

        body.desktop-tv-mode .list-section {
            width: 30vw;
            height: 100vh;
            flex: 0 0 auto;
        }

        body.desktop-tv-mode .topbar {
            flex: 0 0 86px;
            padding: 14px;
        }

        body.desktop-tv-mode .player-title {
            font-size: 16px;
        }

        body.desktop-tv-mode .list-header {
            position: sticky;
            top: 0;
            z-index: 5;
            font-size: 15px;
        }

        body.desktop-tv-mode td {
            padding: 12px 10px;
            font-size: 15px;
        }

        body.desktop-tv-mode .channel-sub {
            font-size: 13px;
        }

        body.desktop-tv-mode .logo {
            width: 46px;
            height: 46px;
        }

        body.desktop-tv-mode .table-wrap {
            overflow-y: auto;
        }

        @media (max-width: 899px) {
            body:not(.desktop-tv-mode) .app {
                flex-direction: column;
            }
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>

                safePlay(targetVideo);
            });

            hlsInstance.on(Hls.Events.ERROR, function (event, data) {
                if (!data || !data.fatal) return;

                const targetIsActive = targetVideo === video;

                if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
                    try {
                        hlsInstance.recoverMediaError();
                        if (targetIsActive) {
                            resetWatchdogProgress();
                            releaseReconnectLock();
                        }
                        return;
                    } catch (e) {
                        if (targetIsActive) {
                            scheduleReconnect('fatal-media');
                        } else {
                            destroyStandbyPipeline();
                        }
                        return;
                    }
                }

                if (targetIsActive) {
                    scheduleReconnect('fatal-hls');
                } else {
                    destroyStandbyPipeline();
                }
            });
        }

        function completeStandbyWarmup(targetVideo) {
            if (!targetVideo || targetVideo !== standbyVideo) {
                return;
            }

            if (targetVideo.dataset.firstFrameReady === '1') {
                return;
            }

            delete targetVideo.dataset.frameWarmupArmed;
            targetVideo.dataset.firstFrameReady = '1';
            markStandbyReady(targetVideo);
        }

        function waitForStandbyFirstFrame(targetVideo) {
            if (!targetVideo || targetVideo !== standbyVideo) {
                return;
            }

            if (targetVideo.dataset.firstFrameReady === '1' || targetVideo.dataset.frameWarmupArmed === '1') {
                return;
            }

            targetVideo.dataset.frameWarmupArmed = '1';
            safePlay(targetVideo);

            const finalize = function () {
                if (!targetVideo || targetVideo !== standbyVideo) {
                    return;
                }

                if ((targetVideo.readyState || 0) < 2 && getBufferedAhead(targetVideo) <= 0.10) {
                    setTimeout(finalize, 60);
                    return;
                }

                completeStandbyWarmup(targetVideo);
            };

            if (typeof targetVideo.requestVideoFrameCallback === 'function') {
                try {
                    targetVideo.requestVideoFrameCallback(function () {
                        finalize();
                    });
                    return;
                } catch (e) {}
            }

            requestAnimationFrame(function () {
                requestAnimationFrame(function () {
                    finalize();
                });
            });

            setTimeout(finalize, 180);
        }

        function bindNativeReady(targetVideo, isStandby) {
            if (!targetVideo || targetVideo.dataset.readyBound === '1') return;

            targetVideo.dataset.readyBound = '1';

            ['loadeddata', 'canplay'].forEach(function (evt) {
                targetVideo.addEventListener(evt, function onReady() {
                    syncTargetVideoToLive(targetVideo, null);

                    if (isStandby || targetVideo === standbyVideo) {
                        waitForStandbyFirstFrame(targetVideo);
                        return;
                    }

                    if (targetVideo.dataset.firstFrameReady === '1') {
                        return;
                    }

                    targetVideo.dataset.firstFrameReady = '1';

                    if (targetVideo === video) {
                        releaseReconnectLock();
                        resetWatchdogProgress(targetVideo.currentTime || 0);
                        safePlay(targetVideo);
                    }
                }, { passive: true });
            });
        }

        function hasReachedPlaybackEnd(targetVideo) {
            const media = targetVideo || video;
            if (!media) {
                return false;
            }

            if (media.ended) {
                return true;
            }

            if (!Number.isFinite(media.duration) || media.duration <= 0) {
                return false;
            }

            const current = Number.isFinite(media.currentTime) ? media.currentTime : 0;
            const remaining = media.duration - current;

            return remaining <= END_EPSILON_SEC;
        }

        function attachChannelSourceTo(targetVideo, ch, isStandby) {
            if (!targetVideo || !ch) return;

            delete targetVideo.dataset.firstFrameReady;
            delete targetVideo.dataset.frameWarmupArmed;
            bindNativeReady(targetVideo, isStandby);

            if (Hls.isSupported()) {
                const instance = createHlsInstance();
                bindHlsCoreEvents(instance, targetVideo);

                if (isStandby) {
                    if (standbyHls) {
                        try { standbyHls.destroy(); } catch (e) {}
                    }
                    standbyHls = instance;
                } else {
                    destroyHls();
                    hls = instance;
                }

                instance.loadSource(ch.url);
                instance.attachMedia(targetVideo);
                return;
            }

            targetVideo.src = ch.url;
            if (!isStandby) {
                safePlay(targetVideo);
            }
        }

        function attachChannelSource(ch) {
            resetPreloadState();
            attachChannelSourceTo(video, ch, false);
        }

        function getChannelRow(index) {
            return document.querySelector('tr[data-index="' + index + '"]');
        }

        function pulseRetuneRow(index) {
            const row = getChannelRow(index);
            if (!row) return;

            row.classList.remove('retune-pulse');
            void row.offsetWidth;
            row.classList.add('retune-pulse');

            setTimeout(function () {
                row.classList.remove('retune-pulse');
            }, 900);
        }

        function hardResetVideoElement() {
            try { video.pause(); } catch (e) {}
            destroyHls();

            try {
                if (video.srcObject) {
                    video.srcObject = null;
                }
            } catch (e) {}

            try { video.removeAttribute('src'); } catch (e) {}
            try { video.load(); } catch (e) {}
        }

        function createStandbyVideoElement() {
            if (standbyVideo) {
                return standbyVideo;
            }

            const el = document.createElement('video');
            el.muted = true;
            el.volume = video.volume;
            el.playbackRate = video.playbackRate || 1;
            el.autoplay = true;
            el.controls = false;
            el.preload = 'auto';
            el.playsInline = true;
            el.setAttribute('playsinline', '');
            el.setAttribute('webkit-playsinline', '');
            el.setAttribute('x5-playsinline', '');
            el.style.position = 'absolute';
            el.style.left = '-99999px';
            el.style.top = '0';
            el.style.width = '1px';
            el.style.height = '1px';
            el.style.opacity = '0';
            el.style.pointerEvents = 'none';
            el.style.background = '#000';
            el.style.objectFit = 'contain';
            videoWrap.appendChild(el);
            standbyVideo = el;
            return standbyVideo;
        }

        function startBackgroundReload() {
            if (activeIndex < 0) return;
            if (preloadInProgress || preloadReady) return;
            if (preloadChannelIndex === activeIndex) return;

            const ch = channels[activeIndex];
            if (!ch || !ch.url) return;

            preloadInProgress = true;
            preloadReady = false;
            preloadChannelIndex = activeIndex;
            preloadTriggeredAt = Date.now();

            const targetVideo = createStandbyVideoElement();
            attachChannelSourceTo(targetVideo, ch, true);
        }

        function maybePrepareBackgroundReload() {
            if (activeIndex < 0) return;
            if (reconnectInFlight) return;
            if (!video || video.seeking) return;
            if (startupLock || !hasProgressed) return;

            if (hasReachedPlaybackEnd(video) || isNearPlaybackEnd(video, PRELOAD_NEAR_END_SEC)) {
                startBackgroundReload();
            }
        }

        function promoteStandbyToActive() {
            if (!preloadReady || !standbyVideo) {
                return false;
            }

            promoteStandbyOnReady = false;
            clearTimeout(reconnectTimer);

            const previousVideo = video;
            const previousHls = hls;
            const nextVideo = standbyVideo;

            nextVideo.controls = true;
            nextVideo.muted = previousVideo.muted;
            nextVideo.volume = previousVideo.volume;
            nextVideo.playbackRate = previousVideo.playbackRate || 1;
            nextVideo.style.position = 'static';
            nextVideo.style.left = 'auto';
            nextVideo.style.top = 'auto';
            nextVideo.style.width = '100%';
            nextVideo.style.height = '100%';
            nextVideo.style.opacity = '1';
            nextVideo.style.pointerEvents = 'auto';
            nextVideo.style.display = 'block';

            if (previousVideo.parentNode) {
                previousVideo.parentNode.replaceChild(nextVideo, previousVideo);
            }

            video = nextVideo;
            hls = standbyHls;
            standbyVideo = null;
            standbyHls = null;
            preloadInProgress = false;
            preloadReady = false;
            preloadChannelIndex = -1;
            preloadTriggeredAt = 0;

            bindPlaybackEvents(video);
            resetWatchdogProgress(video.currentTime || 0);
            releaseReconnectLock();
            safePlay(video);

            try {
                if (previousHls && previousHls !== hls) {
                    previousHls.destroy();
                }
            } catch (e) {}

            try { previousVideo.pause(); } catch (e) {}
            try {
                previousVideo.removeAttribute('src');
                previousVideo.load();
            } catch (e) {}

            return true;
        }

        function reconnectCurrentChannel(reason) {
            const ch = channels[activeIndex];
            if (!ch) {
                releaseReconnectLock();
                return;
            }

            holdReconnectLock(RECONNECT_SETTLE_MS);
            pendingRetuneRequest = {
                hardReset: true,
                preserveState: true,
                forceReload: true,
                keepReconnectLock: true,
                reason: reason || 'retune'
            };

            loadChannel(activeIndex, pendingRetuneRequest);
            pendingRetuneRequest = null;
        }

        function scheduleReconnect(reason, delayMs) {
            if (reconnectInFlight) return;
            reconnectInFlight = true;
            clearPendingReconnect();
            pendingReconnectReason = reason || '';

            reconnectTimer = setTimeout(function () {
                reconnectTimer = null;
                reconnectCurrentChannel(reason);
            }, typeof delayMs === 'number' ? delayMs : RECONNECT_TRIGGER_DELAY_MS);
        }

        function startPlaybackWatchdog() {
            clearInterval(watchdogTimer);

            watchdogTimer = setInterval(function () {
                if (reconnectInFlight) return;
                if (activeIndex < 0) return;
                if (video.seeking) return;
                if (startupLock || !hasProgressed) return;

                maybePrepareBackgroundReload();

                const current = video.currentTime || 0;
                const noProgress = Math.abs(current - lastCurrentTime) < 0.05;
                const reachedEnd = hasReachedPlaybackEnd(video);
                const frozenAtEnd = noProgress && shouldRecoverFromEndStall(video, END_RECONNECT_CONFIRM_MS);
                const frozenOutsideWindow = noProgress && shouldRecoverFromWindowDrift(video, WINDOW_DRIFT_CONFIRM_MS);

                if (frozenOutsideWindow) {
                    scheduleReconnect('window-drift-watchdog', 1500);
                    return;
                }

                if (video.ended || frozenAtEnd || reachedEnd) {
                    promoteStandbyOnReady = true;
                    startBackgroundReload();

                    if (promoteStandbyToActive()) {
                        return;
                    }

                    scheduleReconnect('playback-end', SWITCH_RESCUE_DELAY_MS);
                    return;
                }

                lastCurrentTime = current;
            }, WATCHDOG_INTERVAL_MS);
        }

        function bindPlaybackEvents(targetVideo) {
            if (!targetVideo || targetVideo.dataset.playbackBound === '1') {
                return;
            }

            targetVideo.dataset.playbackBound = '1';

            ['playing', 'timeupdate', 'canplay', 'loadeddata', 'seeked', 'progress', 'durationchange'].forEach(function (evt) {
                targetVideo.addEventListener(evt, function () {
                    if (targetVideo !== video) {
                        return;
                    }

                    if (evt === 'timeupdate' || evt === 'playing') {
                        markStartupProgress(targetVideo);
                    }

                    if (evt === 'timeupdate' || evt === 'loadeddata' || evt === 'canplay' || evt === 'progress' || evt === 'durationchange') {
                        markSeekableProgress(targetVideo);
                    }

                    clearStallRecoveryTimer();

                    if (evt === 'timeupdate') {
                        maybePrepareBackgroundReload();
                    }

                    maybeCancelScheduledReconnect(targetVideo, evt);

                    if (!reconnectInFlight || reconnectTimer) {
                        resetWatchdogProgress();
                    }
                }, { passive: true });
            });

            targetVideo.addEventListener('ended', function () {
                if (targetVideo !== video) {
                    return;
                }

                clearStallRecoveryTimer();
                promoteStandbyOnReady = true;
                startBackgroundReload();

                if (promoteStandbyToActive()) {
                    return;
                }

                scheduleReconnect('video-ended', SWITCH_RESCUE_DELAY_MS);
            });

            targetVideo.addEventListener('stalled', function () {
                if (targetVideo !== video) {
                    return;
                }

                if (hasReachedPlaybackEnd(targetVideo) || isPlaybackEdgeReloadZone(targetVideo)) {
                    promoteStandbyOnReady = true;
                    startBackgroundReload();

                    if (promoteStandbyToActive()) {
                        return;
                    }

                    scheduleReconnect('video-stalled-end', SWITCH_RESCUE_DELAY_MS);
                }
            });

            targetVideo.addEventListener('waiting', function () {
                if (targetVideo !== video) {
                    return;
                }

                if (hasReachedPlaybackEnd(targetVideo) || isPlaybackEdgeReloadZone(targetVideo)) {
                    promoteStandbyOnReady = true;
                    startBackgroundReload();

                    if (promoteStandbyToActive()) {
                        return;
                    }

                    scheduleReconnect('video-waiting-end', SWITCH_RESCUE_DELAY_MS);
                }
            });
        }

        function loadChannel(index, options) {
            if (!channels[index]) return;

            const ch = channels[index];
            const opts = options || {};
            const keepMuted = video.muted;
            const keepVolume = video.volume;
            const keepPlaybackRate = video.playbackRate || 1;

            activeIndex = index;
            hasProgressed = false;
            startupLock = true;
            lastSeekableEnd = NaN;
            lastSeekableEndAt = 0;
            lastBoundaryRecoveryAt = 0;
            promoteStandbyOnReady = false;
            clearTimeout(reconnectTimer);
            clearStallRecoveryTimer();
            if (!opts.keepReconnectLock) {
                releaseReconnectLock();
            }
            playerTitle.textContent = ch.name || "Canal";
            highlightActiveRow();
            resetPreloadState();

            if (opts.hardReset) {
                hardResetVideoElement();
            }

            resetWatchdogProgress(0);
            attachChannelSource(ch);

            if (opts.preserveState) {
                video.muted = keepMuted;
                video.volume = keepVolume;
                video.playbackRate = keepPlaybackRate;
            }
        }

        function handleUserChannelClick(index) {
            const options = pendingRetuneRequest || undefined;
            pendingRetuneRequest = null;

            const now = Date.now();
            const secondClickTooSoon = lastUserClickAt > 0 && (now - lastUserClickAt) < SECOND_CLICK_DELAY_MS;
            lastUserClickAt = now;

            clearTimeout(userClickDelayTimer);

            if (secondClickTooSoon) {
                userClickDelayTimer = setTimeout(function () {
                    loadChannel(index, options);
                    lastUserClickAt = 0;
                }, SECOND_CLICK_DELAY_MS);
                return;
            }

            loadChannel(index, options);
        }

        function highlightActiveRow() {
            const rows = document.querySelectorAll('tr[data-index]');
            rows.forEach(function(row) {
                const idx = parseInt(row.getAttribute('data-index'), 10);
                row.classList.toggle('active', idx === activeIndex);
            });
        }

        function renderChannels() {
            channelsBody.innerHTML = '';

            channels.forEach(function(ch, index) {
                const tr = document.createElement('tr');
                tr.setAttribute('data-index', index);

                const tdLogo = document.createElement('td');
                tdLogo.className = 'col-logo';

                const img = document.createElement('img');
                img.className = 'logo';
                img.alt = ch.name || 'logo';
                img.src = ch.logo || '';
                img.onerror = function() {
                    this.style.visibility = 'hidden';
                };
                tdLogo.appendChild(img);

                const tdInfo = document.createElement('td');
                const nameBox = document.createElement('div');
                nameBox.className = 'name-box';

                const nameDiv = document.createElement('div');
                nameDiv.className = 'channel-name';
                nameDiv.textContent = ch.name || 'Canal';

                const subDiv = document.createElement('div');
                subDiv.className = 'channel-sub';
                subDiv.textContent = 'Toca para reproducir';

                nameBox.appendChild(nameDiv);
                nameBox.appendChild(subDiv);
                tdInfo.appendChild(nameBox);

                const tdAction = document.createElement('td');
                tdAction.style.width = '80px';
                tdAction.style.textAlign = 'right';

                const badge = document.createElement('span');
                badge.className = 'play-badge';
                badge.textContent = '▶ Ver';
                tdAction.appendChild(badge);

                tr.appendChild(tdLogo);
                tr.appendChild(tdInfo);
                tr.appendChild(tdAction);

                tr.addEventListener('click', function() {
                    handleUserChannelClick(index);
                });

                channelsBody.appendChild(tr);
            });
        }

        bindPlaybackEvents(video);

        vegetaBtn.addEventListener('click', function () {
            window.location.href = 'https://fuego01.github.io/Vegetatv/';
        });

        applyLayoutMode();
        window.addEventListener('resize', applyLayoutMode);
        window.addEventListener('orientationchange', applyLayoutMode);

        startPlaybackWatchdog();

        renderChannels();

        if (channels.length > 0) {
            loadChannel(0);
        }
    </script>
</body>
</html>
